<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <header>
        <h1>EcoViagens</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
            </ul>
        </nav>
    </header>

    <main class="cadastro-main">
        <div class="container-cadastro">
            <div class="caixa-cadastro">
                <div class="header-cadastro">
                    <h2>Criar Conta</h2>
                    <p>Junte-se a nós e torne-se um cliente</p>
                </div>

                <form onsubmit="cadastrarUsuario(event)" autocomplete="off">
                    <div class="input-group">
                        <input type="text" id="nome" placeholder=" " required>
                        <label>Nome Completo</label>
                        <div class="bar"></div>
                        <span class="msg-erro" id="erro-nome"></span>
                    </div>

                    <div class="input-group">
                        <input type="text" id="usuario" placeholder=" " required>
                        <label>Usuário</label>
                        <div class="bar"></div>
                        <span class="msg-erro" id="erro-usuario"></span>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label>E-mail</label>
                        <div class="bar"></div>
                        <span class="msg-erro" id="erro-email"></span>
                    </div>

                    <div class="input-group">
                        <input type="password" id="senha" placeholder=" " required>
                        <label>Senha</label>
                        <div class="bar"></div>
                        <span class="toggle-password" onclick="toggleSenha('senha', this)">🙉</span>
                        <span class="msg-erro" id="erro-senha"></span>
                    </div>

                    <div class="input-group">
                        <input type="password" id="confirmar" placeholder=" " required>
                        <label>Confirmar Senha</label>
                        <div class="bar"></div>
                        <span class="toggle-password" onclick="toggleSenha('confirmar', this)">🙉</span>
                        <span class="msg-erro" id="erro-confirmar"></span>
                    </div>

                    <button type="submit" class="btn-cadastro-submit">Finalizar Cadastro</button>
                    
                    <span class="msg-erro" id="erro-final" style="text-align: center; margin-top: 20px; width: 100%; display: block;"></span>
                </form>

                <div class="link-rodape">
                    Já tem uma conta? <a href="login.html">Faça Login</a>
                </div>
            </div>

            <div class="imagem-side-cadastro">
                <div class="overlay-texto">
                    <span>ECOVIAGENS</span>
                    <p>A sua próxima aventura começa aqui</p>
                </div>
            </div>
        </div>
    </main>
    <script src="cadastro.js"></script>
    <script src="global.js"></script>
</body>
</html>
