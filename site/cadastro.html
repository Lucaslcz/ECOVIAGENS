<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro | EcoViagens</title>
</head>
<body>
    <header>
        <h1>EcoViagens</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="transportes.html">Transportes</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="cadastro-main">
        <div class="container-cadastro">
            <div class="caixa-cadastro">
                <div class="header-cadastro">
                    <h2>Crie sua conta</h2>
                    <p>Junte-se à nós e se torne um cliente.</p>
                </div>

                <form onsubmit="cadastrarUsuario(event)">
                    <div class="input-group">
                        <input type="text" id="nome" placeholder=" " required>
                        <label>Nome Completo</label>
                        <div class="bar"></div>
                    </div>

                    <div class="input-group">
                        <input type="text" id="usuario" placeholder=" " required>
                        <label>Usuário</label>
                        <div class="bar"></div>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label>Email</label>
                        <div class="bar"></div>
                    </div>

                    <div class="input-group">
                        <input type="password" id="senha" placeholder=" " required>
                        <label>Senha</label>
                        <div class="bar"></div>
                    </div>

                    <div class="input-group">
                        <input type="password" id="confirmar" placeholder=" " required>
                        <label>Confirmar Senha</label>
                        <div class="bar"></div>
                    </div>

                    <button type="submit" class="btn-cadastro-submit">FINALIZAR CADASTRO</button>
                </form>

                <div class="link-rodape">
                    Já tem conta? <a href="login.html">Fazer login</a>
                </div>
            </div>

            <div class="imagem-side-cadastro">
                <div class="overlay-texto">
                    <span>ECOVIAGENS</span>
                    <p>Sua jornada começa aqui.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function cadastrarUsuario(event) {
            event.preventDefault();

            if (document.getElementById("senha").value != document.getElementById("confirmar").value) {
                alert("As senhas não coincidem");
                return;
            }

            const dados = {
                nome: document.getElementById("nome").value,
                usuario: document.getElementById("usuario").value,
                email: document.getElementById("email").value,
                senha: document.getElementById("senha").value
            };

            try {
                const resposta = await fetch("http://localhost:5110/cadastro", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                });

                if (resposta.ok) {
                    alert("Cadastro realizado com sucesso!");
                    window.location.href = "login.html";
                } else {
                    alert("Erro ao cadastrar.");
                }
            } catch (error) {
                localStorage.setItem('dadosUsuario', JSON.stringify(dados));
                alert("Simulação: Cadastro salvo localmente!");
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
