<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="cadastro.css">

<title>Cadastro - EcoViagens</title>

</head>


<body>


<header>

<h1>EcoViagens</h1>

<nav>

<ul>

<li><a href="index.html">Início</a></li>

<li><a href="destino.html">Destinos</a></li>

<li><a href="login.html">Login</a></li>

</ul>

</nav>

</header>


<main>


<div class="container-cadastro">


<div class="caixa-cadastro">


<h2>Crie sua conta</h2>

<p>Junte-se à nossa comunidade.</p>


<form onsubmit="cadastrarUsuario(event)">


<label>Nome Completo</label>
<input type="text" id="nome" required>


<label>Usuário</label>
<input type="text" id="usuario" required>


<label>Email</label>
<input type="email" id="email" required>


<label>Senha</label>
<input type="password" id="senha" required>


<label>Confirmar senha</label>
<input type="password" id="confirmar" required>


<button type="submit">

Finalizar Cadastro

</button>


</form>


<div class="link-rodape">

Já tem conta?
<a href="login.html">Fazer login</a>

</div>


</div>


<div class="imagem-cadastro"></div>


</div>


</main>



<script>


async function cadastrarUsuario(event)
{

event.preventDefault();


if(
document.getElementById("senha").value
!=
document.getElementById("confirmar").value
)
{
alert("Senhas não coincidem");
return;
}


const dados =
{
nome: document.getElementById("nome").value,

usuario: document.getElementById("usuario").value,

email: document.getElementById("email").value,

senha: document.getElementById("senha").value
};


const resposta = await fetch(

"http://localhost:5110/cadastro",

{
method: "POST",

headers:
{
"Content-Type": "application/json"
},

body: JSON.stringify(dados)

});


if(resposta.ok)
{
alert("Cadastro realizado");

window.location.href = "login.html";
}
else
{
alert("Erro ao cadastrar");
}


}


</script>


</body>

</html>
