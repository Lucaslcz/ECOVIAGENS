<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="login.css">
    <title>Login | EcoViagens</title>
</head>
<body>
    <header>
        <h1>EcoViagens</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-main">
        <div class="container-login">
            <div class="imagem-side">
                <div class="overlay-texto">
                    <span>ECOVIAGENS</span>
                    <p>Caminhando para o mundo moderno.</p>
                </div>
            </div>
            
            <div class="caixa-login">
                <div class="header-login">
                    <h2>Bem-vindo</h2>
                    <p>Acesse sua conta para continuar</p>
                </div>

                <form onsubmit="fazerLogin(event)" autocomplete="off">
                    <div class="input-group">
                        <input type="text" id="usuario" placeholder=" " required>
                        <label>Usuário</label>
                        <div class="bar"></div>
                        <span class="msg-erro" id="erro-usuario"></span>
                    </div>

                    <div class="input-group" style="position: relative;">
                        <input type="password" id="senha" placeholder=" " required>
                        <label>Senha</label>
                        <div class="bar"></div>
                        <span class="toggle-password" onclick="toggleSenha('senha', this)" style="position: absolute; right: 0; bottom: 8px; cursor: pointer;">🙉</span>
                        <span class="msg-erro" id="erro-senha"></span>
                    </div>

                    <button type="submit" class="btn-cadastro-submit">Entrar</button>
                    
                    <span class="msg-erro" id="erro-final" style="text-align: center; margin-top: 20px; width: 100%; display: block;"></span>
                </form>

                <div class="link-rodape">
                    Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a>
                </div>
            </div>
        </div>
    </main>

    <script src="login.js"></script>
    <script src="global.js"></script>
</body>
</html>
